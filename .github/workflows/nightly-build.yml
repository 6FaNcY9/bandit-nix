name: Nightly Build Test

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-build:
    name: Update Flake Inputs and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake
        run: nix flake check --no-update-lock-file --no-build

      - name: Build with updated inputs
        run: |
          nix build .#nixosConfigurations.bandit.config.system.build.toplevel \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      # Only push the new flake.lock if the checks and build above succeeded.
      # This prevents publishing a known-broken lock file to the default branch.
      - name: Commit and push updated flake.lock
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.lock; then
            echo "No changes to flake.lock"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake.lock"
          # Rebase in case main moved while we were building, then push.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Nightly build succeeded with latest inputs"
          else
            echo "❌ Nightly build failed with latest inputs"
            exit 1
          fi
