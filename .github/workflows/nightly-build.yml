name: Nightly Build Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  update-and-build:
    name: Update Flake Inputs and Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake
        run: nix flake check --no-update-lock-file

      - name: Build with updated inputs
        run: |
          nix build .#nixosConfigurations.bandit-ci.config.system.build.toplevel \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      - name: Commit updated flake.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake.lock" || echo "No changes to commit"
          git push || echo "Nothing to push"

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Nightly build succeeded with latest inputs"
          else
            echo "❌ Nightly build failed with latest inputs"
            exit 1
          fi
