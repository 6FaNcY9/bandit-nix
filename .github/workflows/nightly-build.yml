name: Nightly Build Test

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-and-build:
    name: Update Flake Inputs and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Update flake inputs
        run: nix flake update

      - name: Check flake
        run: nix flake check --no-build --no-update-lock-file

      - name: Build with updated inputs
        run: |
          nix build .#nixosConfigurations.bandit.config.system.build.toplevel \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      - name: Commit updated flake.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock

          if git diff --cached --quiet; then
            echo "No flake.lock changes to commit"
            exit 0
          fi

          git commit -m "chore: update flake.lock"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          nix flake check --no-build --no-update-lock-file
          git push

      - name: Report build status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Nightly build succeeded with latest inputs"
          else
            echo "❌ Nightly build failed with latest inputs"
            exit 1
          fi
