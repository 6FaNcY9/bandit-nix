name: Test NixOS Configuration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC

jobs:
  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Check and Build NixOS Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Check flake
        # --no-build keeps this job fast and prevents it from trying to build
        # the VM test (checks.x86_64-linux.bandit-test), which requires KVM
        # and is exercised by the dedicated build-vm job below.
        run: nix flake check --no-update-lock-file --no-build

      - name: Check formatting
        run: nix run nixpkgs#alejandra -- --check .

      - name: Check for dead code
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Check for antipatterns
        run: nix run nixpkgs#statix -- check .

      - name: Build NixOS configuration
        run: |
          nix build .#nixosConfigurations.bandit.config.system.build.toplevel \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      - name: Show build result
        if: success()
        run: |
          echo "✅ NixOS configuration built successfully!"
          nix path-info .#nixosConfigurations.bandit.config.system.build.toplevel

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Build for scanning
        run: |
          nix build .#nixosConfigurations.bandit.config.system.build.toplevel \
            --no-update-lock-file \
            --fallback

      - name: Scan for vulnerabilities
        # vulnix exits 0 = no CVEs, 1 = CVEs found, 2 = error. We want to
        # tolerate "CVEs found" (so the job still uploads the report and
        # surfaces a summary) but fail on real errors (e.g. vulnix crashed
        # or the result symlink is missing).
        run: |
          set -o pipefail
          status=0
          nix run nixpkgs#vulnix -- --json ./result > vulnix-report.json || status=$?
          if [ "$status" -ge 2 ]; then
            echo "::error::vulnix exited with status $status (scan error)"
            exit "$status"
          fi
          if [ ! -s vulnix-report.json ]; then
            echo "[]" > vulnix-report.json
          fi

      - name: Show vulnerability summary
        run: |
          set -euo pipefail
          COUNT=$(python3 -c "import json,sys; print(len(json.load(open('vulnix-report.json'))))")
          echo "Vulnerabilities found: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::vulnix reported $COUNT vulnerable package(s); see uploaded vulnix-report artifact"
          fi

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnix-report
          path: vulnix-report.json

  build-vm:
    name: Build and Test VM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run NixOS VM test
        run: |
          nix build .#checks.x86_64-linux.bandit-test \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

  update-flake:
    name: Update flake.lock
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v13

      - name: Update flake inputs
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake inputs"
          branch: update-flake-lock
          body: "Automated flake.lock update"