name: Test NixOS Configuration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 6am UTC

jobs:
  lint-commits:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@f133a0d95090ef2609192b4a21f54e20af819ea9 # v6

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Check and Build NixOS Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Check flake
        run: nix flake check --no-update-lock-file

      - name: Check formatting
        run: nix run nixpkgs#alejandra -- --check .

      - name: Check for dead code
        run: nix run nixpkgs#deadnix -- --fail .

      - name: Check for antipatterns
        run: nix run nixpkgs#statix -- check .

      - name: Build NixOS configuration
        run: |
          nix build .#nixosConfigurations.bandit-ci.config.system.build.toplevel \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      - name: Show build result
        if: success()
        run: |
          echo "✅ NixOS configuration built successfully!"
          nix path-info .#nixosConfigurations.bandit-ci.config.system.build.toplevel

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Build for scanning
        run: |
          nix build .#nixosConfigurations.bandit-ci.config.system.build.toplevel \
            --no-update-lock-file \
            --fallback

      - name: Scan for vulnerabilities
        run: |
          nix run nixpkgs#vulnix -- \
            --json \
            ./result > vulnix-report.json || true
          if [ ! -s vulnix-report.json ]; then
            echo "[]" > vulnix-report.json
          fi

      - name: Show vulnerability summary
        run: |
          COUNT=$(cat vulnix-report.json | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))" 2>/dev/null || echo "unknown")
          echo "Vulnerabilities found: $COUNT"

      - name: Upload vulnerability report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vulnix-report
          path: vulnix-report.json

  build-vm:
    name: Build and Test VM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build VM
        run: |
          nix build .#nixosConfigurations.bandit-ci.config.system.build.vm \
            --print-build-logs \
            --no-update-lock-file \
            --fallback

      - name: Test VM boots
        timeout-minutes: 5
        run: |
          timeout 90s result/bin/run-bandit-vm 2>&1 | tee /tmp/vm-boot.log &
          VM_PID=$!
          for i in $(seq 1 18); do
            sleep 5
            if grep -qE "login:|Startup finished" /tmp/vm-boot.log 2>/dev/null; then
              echo "✅ VM reached login prompt"
              kill "$VM_PID" 2>/dev/null || true
              exit 0
            fi
            if grep -qE "Kernel panic|kernel BUG at|OOPS:" /tmp/vm-boot.log 2>/dev/null; then
              echo "❌ VM kernel panic detected"
              tail -50 /tmp/vm-boot.log
              kill "$VM_PID" 2>/dev/null || true
              exit 1
            fi
          done
          kill "$VM_PID" 2>/dev/null || true
          echo "❌ VM did not reach login prompt within 90s"
          tail -50 /tmp/vm-boot.log
          exit 1

  update-flake:
    name: Update flake.lock
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13

      - name: Update flake inputs
        run: nix flake update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
        with:
          commit-message: "chore: update flake.lock"
          title: "chore: update flake inputs"
          branch: update-flake-lock
          body: "Automated flake.lock update"