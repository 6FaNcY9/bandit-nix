name: Auto Format Nix Files

on:
  push:
    paths:
      - '**/*.nix'
  workflow_dispatch:

jobs:
  format-nix:
    name: Format Nix files
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ab6bcb2d5af0e904d04aea750e2089e9dc4cbfdd # v13
        with:
          extra-conf: |
            substituters = https://cache.nixos.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Format with alejandra
        run: nix run nixpkgs#alejandra -- .

      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            echo "No formatting changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: auto-format nix files"
          git push
